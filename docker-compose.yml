services:
  postgres:
    image: postgres:17-alpine
    container_name: yehub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yehub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yehub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: yehub-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/yehub &&
        mc anonymous set none local/yehub
      "

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: yehub-smtp4dev
    restart: unless-stopped
    ports:
      - "5555:80"
      - "2525:25"
    volumes:
      - smtp4dev_data:/smtp4dev

  migrate:
    build:
      context: ./yehub-be
      dockerfile: Dockerfile
    command: ["prisma", "migrate", "deploy", "--schema=prisma/schema.prisma"]
    container_name: yehub-migrate
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/yehub"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./yehub-be
      dockerfile: Dockerfile
    container_name: yehub-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      PORT: "3000"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/yehub"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "docker-dev-jwt-secret-min16chars"
      JWT_REFRESH_SECRET: "docker-dev-jwt-refresh-secret-min16chars"
      FRONTEND_URL: "http://localhost:5173"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
      S3_PUBLIC_URL: "http://localhost:9000"
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: "us-east-1"
      S3_BUCKET: "yehub"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"
      SMTP_HOST: "smtp4dev"
      SMTP_PORT: "25"
      SMTP_FROM: "noreply@yehub.com"

  worker:
    build:
      context: ./yehub-be
      dockerfile: Dockerfile
    container_name: yehub-worker
    restart: unless-stopped
    command: ["node", "dist/src/worker"]
    ports:
      - "3001:3001"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      WORKER_PORT: "3001"
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/yehub"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "docker-dev-jwt-secret-min16chars"
      JWT_REFRESH_SECRET: "docker-dev-jwt-refresh-secret-min16chars"
      S3_ENDPOINT: "http://minio:9000"
      S3_PUBLIC_ENDPOINT: "http://localhost:9000"
      S3_PUBLIC_URL: "http://localhost:9000"
      S3_FORCE_PATH_STYLE: "true"
      S3_REGION: "us-east-1"
      S3_BUCKET: "yehub"
      S3_ACCESS_KEY: "minioadmin"
      S3_SECRET_KEY: "minioadmin"

  frontend:
    build:
      context: ./yehub-fe
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api/v1"
    environment:
      API_PROXY_TARGET: http://backend:3000
    container_name: yehub-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  smtp4dev_data:
