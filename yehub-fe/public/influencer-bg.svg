<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" fill="none">
  <!-- Influencer Directory: profiles, stars, connections, followers -->

  <!-- Large profile circles -->
  <circle cx="380" cy="80" r="45" fill="#C8A851" opacity="0.06"/>
  <circle cx="300" cy="180" r="55" fill="#C8A851" opacity="0.05"/>
  <circle cx="430" cy="220" r="40" fill="#C8A851" opacity="0.06"/>

  <!-- Profile silhouettes -->
  <g transform="translate(362, 55)" opacity="0.14">
    <circle cx="18" cy="12" r="10" fill="#C8A851"/>
    <path d="M4 38c0-8 6-14 14-14s14 6 14 14" fill="#C8A851"/>
  </g>
  <g transform="translate(278, 148)" opacity="0.1">
    <circle cx="22" cy="15" r="13" fill="#C8A851"/>
    <path d="M4 48c0-10 8-18 18-18s18 8 18 18" fill="#C8A851"/>
  </g>
  <g transform="translate(414, 195)" opacity="0.12">
    <circle cx="16" cy="10" r="9" fill="#C8A851"/>
    <path d="M3 34c0-7 5-13 13-13s13 6 13 13" fill="#C8A851"/>
  </g>

  <!-- Connection lines between profiles -->
  <line x1="380" y1="80" x2="300" y2="180" stroke="#C8A851" opacity="0.08" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="300" y1="180" x2="430" y2="220" stroke="#C8A851" opacity="0.08" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="380" y1="80" x2="430" y2="220" stroke="#C8A851" opacity="0.06" stroke-width="1"/>

  <!-- Stars (rating/influence) -->
  <g transform="translate(340, 130)" opacity="0.15">
    <polygon points="8,0 10,6 16,6 11,10 13,16 8,12 3,16 5,10 0,6 6,6" fill="#C8A851"/>
  </g>
  <g transform="translate(420, 160)" opacity="0.1">
    <polygon points="6,0 7.5,4.5 12,4.5 8.5,7.5 10,12 6,9 2,12 3.5,7.5 0,4.5 4.5,4.5" fill="#C8A851"/>
  </g>
  <g transform="translate(280, 240)" opacity="0.12">
    <polygon points="7,0 9,5 14,5 10,8.5 11.5,14 7,10.5 2.5,14 4,8.5 0,5 5,5" fill="#C8A851"/>
  </g>

  <!-- Follower count badges -->
  <g transform="translate(350, 40)" opacity="0.08">
    <rect x="0" y="0" width="36" height="16" rx="8" fill="#C8A851"/>
    <text x="18" y="12" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="white" text-anchor="middle">100K</text>
  </g>
  <g transform="translate(440, 180)" opacity="0.08">
    <rect x="0" y="0" width="30" height="14" rx="7" fill="#C8A851"/>
    <text x="15" y="10.5" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="white" text-anchor="middle">50K</text>
  </g>

  <!-- Verified checkmarks -->
  <g transform="translate(400, 70)" opacity="0.16">
    <circle cx="7" cy="7" r="7" fill="#C8A851"/>
    <polyline points="4,7 6.5,9.5 10,4.5" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Small floating elements -->
  <circle cx="460" cy="100" r="3" fill="#C8A851" opacity="0.1"/>
  <circle cx="240" cy="220" r="2.5" fill="#C8A851" opacity="0.08"/>
  <circle cx="470" cy="270" r="2" fill="#C8A851" opacity="0.09"/>
  <circle cx="350" cy="260" r="3" fill="#C8A851" opacity="0.07"/>
  <circle cx="260" cy="100" r="2" fill="#C8A851" opacity="0.08"/>
</svg>
