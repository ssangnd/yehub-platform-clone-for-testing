# Render Blueprint – yehub-platform
# https://docs.render.com/blueprint-spec
#
# After first deploy, set these manually in the Render dashboard:
#   - yehub-be: FRONTEND_URL = https://<yehub-fe-host>.onrender.com
#   - yehub-be: S3_*, SMTP_* credentials for your providers
#   - yehub-fe: update rewrite destination if backend URL differs

projects:
  - name: yehub-platform
    environments:
      - name: demo
        services:
          # ── Redis ──────────────────────────────────────────────────
          - name: yehub-redis
            type: redis
            region: singapore
            plan: free
            maxmemoryPolicy: volatile-ttl
            ipAllowList: [] # only internal access

          # ── Backend (NestJS) ───────────────────────────────────────
          - name: yehub-be
            type: web
            region: singapore
            runtime: docker
            plan: free
            rootDir: yehub-be
            dockerfilePath: ./Dockerfile
            dockerContext: .
            healthCheckPath: /health/readiness
            autoDeployTrigger: checksPass
            # preDeployCommand: "pnpm prisma:migrate:deploy" # uncomment after upgrading to paid plan
            envVars:
              - key: PORT
                value: "3000"
              - key: DATABASE_URL
                fromDatabase:
                  name: yehub-postgres
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  name: yehub-redis
                  type: redis
                  property: connectionString
              - key: JWT_SECRET
                generateValue: true
              - key: JWT_REFRESH_SECRET
                generateValue: true
              - key: FRONTEND_URL
                value: https://yehub-fe-g59f.onrender.com
              - key: S3_ENDPOINT
                sync: false
              - key: S3_REGION
                sync: false
              - key: S3_BUCKET
                sync: false
              - key: S3_ACCESS_KEY
                sync: false
              - key: S3_SECRET_KEY
                sync: false
              - key: SMTP_HOST
                sync: false
              - key: SMTP_PORT
                sync: false
              - key: SMTP_USER
                sync: false
              - key: SMTP_PASS
                sync: false
              - key: SMTP_FROM
                value: tidihub.vn@gmail.com

          # ── Frontend (React Static Site) ─────────────────────────────
          - name: yehub-fe
            type: web
            runtime: static
            rootDir: yehub-fe
            autoDeployTrigger: checksPass
            buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
            staticPublishPath: ./dist
            pullRequestPreviewsEnabled: true
            routes:
              - type: rewrite
                source: /v1/*
                destination: https://yehub-be-g59f.onrender.com/v1/*
              - type: rewrite
                source: /*
                destination: /index.html
            envVars:
              - key: VITE_API_URL
                value: /v1

        databases:
          - name: yehub-postgres
            region: singapore
            plan: free
            databaseName: yehub
            user: yehub
            postgresMajorVersion: "17"

# ── Standalone Services (not part of the project) ─────────────────────
services:
  # ── Database Migration ──────────────────────────────────────────────
  - type: web
    name: yehub-migration
    region: singapore
    runtime: docker
    plan: free
    autoDeploy: false
    dockerfilePath: ./yehub-be/Dockerfile.migrate
    dockerContext: ./yehub-be
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: yehub-postgres
          property: connectionString
