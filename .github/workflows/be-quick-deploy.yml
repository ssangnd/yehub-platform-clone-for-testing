name: Backend — Quick Deploy (Build + ECR + Beanstalk)

# ============================================================
# Quick deploy for testing — skips lint, test, and scan
# Use this to test infra/deployment without waiting for full CI
# DO NOT use for production releases — use be-build-deploy.yml
# ============================================================

on:
  workflow_dispatch:
    inputs:
      deploy_api:
        description: 'Deploy API to Beanstalk?'
        required: true
        default: 'true'
        type: choice
        options: ['true', 'false']
      deploy_worker:
        description: 'Deploy Worker to Beanstalk?'
        required: true
        default: 'false'
        type: choice
        options: ['true', 'false']

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY_APP: ${{ secrets.ECR_REPOSITORY_APP }}
  ECR_REPOSITORY_WORKER: ${{ secrets.ECR_REPOSITORY_WORKER }}
  EB_APPLICATION: ${{ secrets.EB_APPLICATION }}
  EB_ENV_API: ${{ secrets.EB_ENV_API }}
  EB_ENV_WORKER: ${{ secrets.EB_ENV_WORKER }}
  S3_BUCKET: ${{ secrets.S3_BUCKET_EB }}

jobs:
  # ============================================================
  # Build Docker image and push to ECR
  # ============================================================
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          VERSION=$(grep -m1 '"version"' yehub-be/package.json | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          TAG="${VERSION}-$(git rev-parse --short HEAD)"
          BASE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "app_uri=${BASE}/${{ env.ECR_REPOSITORY_APP }}:${TAG}" >> $GITHUB_OUTPUT
          echo "worker_uri=${BASE}/${{ env.ECR_REPOSITORY_WORKER }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: yehub-be
          file: yehub-be/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.app_uri }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_APP }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # Separate build (not a re-tag of the API image): the worker needs its
      # own CMD (dist/src/worker) baked in via the Dockerfile's "worker"
      # stage, since EB's Dockerrun.aws.json "Cmd" override isn't honored on
      # the AL2023 single-container Docker platform.
      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: yehub-be
          file: yehub-be/Dockerfile
          target: worker
          push: true
          tags: |
            ${{ steps.meta.outputs.worker_uri }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_WORKER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================
  # Deploy API to Beanstalk
  # ============================================================
  deploy-api:
    name: Deploy API → Beanstalk
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ inputs.deploy_api == 'true' }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: yehub-be/.ebextensions-api

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Dockerrun.aws.json
        run: |
          # Reconstruct the image URI here from env (secrets) + tag.
          # We CANNOT pass the full URI as a cross-job output because it contains
          # AWS_ACCOUNT_ID (a secret) — GitHub masks secret-containing job outputs,
          # which arrive empty in downstream jobs. Only the non-secret tag is passed.
          TAG="${{ needs.build-push.outputs.image_tag }}"
          if [ -z "$TAG" ]; then
            echo "ERROR: image_tag is empty — run the full workflow, not just the deploy job."
            exit 1
          fi
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_APP }}:${TAG}"
          echo "Using image tag: $TAG"
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${IMAGE_URI}",
              "Update": "true"
            },
            "Ports": [{ "ContainerPort": 3000, "HostPort": 3000 }]
          }
          EOF
          echo "=== Dockerrun.aws.json ==="
          cat Dockerrun.aws.json

      - name: Package and upload to S3
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          # Build clean bundle in isolated dir — ONLY Dockerrun + ebextensions
          # (no Dockerfile, or EB tries to build instead of pulling ECR image)
          rm -rf bundle && mkdir bundle
          cp Dockerrun.aws.json bundle/
          cp -r yehub-be/.ebextensions-api bundle/.ebextensions
          cd bundle
          zip -r ../api-${TAG}.zip Dockerrun.aws.json .ebextensions/
          cd ..
          echo "=== Bundle contents ==="
          unzip -l api-${TAG}.zip
          aws s3 cp api-${TAG}.zip s3://${{ env.S3_BUCKET }}/deployments/api-${TAG}.zip

      - name: Create Beanstalk app version
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          # Check if version already exists, skip creation if so
          EXISTING=$(aws elasticbeanstalk describe-application-versions \
            --application-name ${{ env.EB_APPLICATION }} \
            --version-labels "api-${TAG}" \
            --query "ApplicationVersions[0].VersionLabel" \
            --output text --region ${{ env.AWS_REGION }} 2>/dev/null || echo "None")

          if [ "$EXISTING" = "None" ] || [ -z "$EXISTING" ]; then
            aws elasticbeanstalk create-application-version \
              --application-name ${{ env.EB_APPLICATION }} \
              --version-label api-${TAG} \
              --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="deployments/api-${TAG}.zip" \
              --region ${{ env.AWS_REGION }}
          else
            echo "Version api-${TAG} already exists, skipping creation."
          fi

      - name: Deploy to Beanstalk
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-name ${{ env.EB_ENV_API }} \
            --version-label api-${TAG} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-names ${{ env.EB_ENV_API }} \
            --region ${{ env.AWS_REGION }}

  # ============================================================
  # Deploy Worker to Beanstalk
  # ============================================================
  deploy-worker:
    name: Deploy Worker → Beanstalk
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ inputs.deploy_worker == 'true' }}

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: yehub-be/.ebextensions-worker

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Dockerrun.aws.json
        run: |
          # Reconstruct URI from env (secrets) + tag — see note in deploy-api.
          TAG="${{ needs.build-push.outputs.image_tag }}"
          if [ -z "$TAG" ]; then
            echo "ERROR: image_tag is empty — run the full workflow, not just the deploy job."
            exit 1
          fi
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_WORKER }}:${TAG}"
          echo "Using image tag: $TAG"
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${IMAGE_URI}",
              "Update": "true"
            },
            "Ports": [{ "ContainerPort": 3001, "HostPort": 3001 }]
          }
          EOF
          echo "=== Dockerrun.aws.json ==="
          cat Dockerrun.aws.json

      - name: Package and upload to S3
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          cp -r yehub-be/.ebextensions-worker .ebextensions
          zip -r worker-${TAG}.zip Dockerrun.aws.json .ebextensions/
          aws s3 cp worker-${TAG}.zip s3://${{ env.S3_BUCKET }}/deployments/worker-${TAG}.zip

      - name: Create Beanstalk app version
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          EXISTING=$(aws elasticbeanstalk describe-application-versions \
            --application-name ${{ env.EB_APPLICATION }} \
            --version-labels "worker-${TAG}" \
            --query "ApplicationVersions[0].VersionLabel" \
            --output text --region ${{ env.AWS_REGION }} 2>/dev/null || echo "None")

          if [ "$EXISTING" = "None" ] || [ -z "$EXISTING" ]; then
            aws elasticbeanstalk create-application-version \
              --application-name ${{ env.EB_APPLICATION }} \
              --version-label worker-${TAG} \
              --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="deployments/worker-${TAG}.zip" \
              --region ${{ env.AWS_REGION }}
          else
            echo "Version worker-${TAG} already exists, skipping creation."
          fi

      - name: Deploy to Beanstalk
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-name ${{ env.EB_ENV_WORKER }} \
            --version-label worker-${TAG} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-names ${{ env.EB_ENV_WORKER }} \
            --region ${{ env.AWS_REGION }}
