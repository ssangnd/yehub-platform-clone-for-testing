name: Frontend — Build, Scan & Deploy to S3

on:
  push:
    tags:
      - 'v*'          # Only deploy on version tags
    paths:
      - 'yehub-fe/**'

env:
  AWS_REGION: ap-southeast-1
  S3_BUCKET: projecta-frontend-prod        # S3 bucket for frontend static files
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  # ============================================================
  # Job 1: CI — lint, format check, build
  # ============================================================
  ci:
    name: Lint, Format & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yehub-fe

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: yehub-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          VITE_API_URL: /api/v1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: yehub-fe/dist
          retention-days: 1

  # ============================================================
  # Job 2: Scan source code with Trivy
  # ============================================================
  scan-source:
    name: Scan Source Code (Trivy)
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: yehub-fe
          format: sarif
          output: trivy-fe-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fe-results.sarif
          category: trivy-fe-source

  # ============================================================
  # Job 3: Deploy to S3 + invalidate CloudFront
  # ============================================================
  deploy:
    name: Deploy → S3 + CloudFront invalidation
    runs-on: ubuntu-latest
    needs: [ci, scan-source]
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Upload assets with long cache (immutable hashed filenames)
          aws s3 sync dist/assets s3://${{ env.S3_BUCKET }}/assets \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # Upload everything else (HTML, manifest) with no-cache
          aws s3 sync dist s3://${{ env.S3_BUCKET }} \
            --exclude "assets/*" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
