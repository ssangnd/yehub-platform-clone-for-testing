name: yehub-fe CI

on:
  push:
    branches: [main]
    paths:
      - 'yehub-fe/**'
  pull_request:
    branches: [main]
    paths:
      - 'yehub-fe/**'

defaults:
  run:
    working-directory: yehub-fe

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: yehub-fe/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
