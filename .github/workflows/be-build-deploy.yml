name: Backend — Build, Scan & Deploy to Beanstalk

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'yehub-be/**'
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy to Beanstalk after build?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      image_tag:
        description: 'Image tag to deploy (e.g. v1.0.0) — only used when skipping build'
        required: false
        default: ''

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY_APP: ${{ secrets.ECR_REPOSITORY_APP }}
  ECR_REPOSITORY_WORKER: ${{ secrets.ECR_REPOSITORY_WORKER }}
  EB_APPLICATION: ${{ secrets.EB_APPLICATION }}
  EB_ENV_API: ${{ secrets.EB_ENV_API }}
  EB_ENV_WORKER: ${{ secrets.EB_ENV_WORKER }}
  S3_BUCKET: ${{ secrets.S3_BUCKET_EB }}

jobs:
  # ============================================================
  # Job 1: CI — lint, test, build check
  # ============================================================
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yehub-be

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: yehub-be/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # ============================================================
  # Job 2: Scan source code with Trivy
  # ============================================================
  scan-source:
    name: Scan Source Code (Trivy)
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: yehub-be
          format: sarif
          output: trivy-source-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-source-results.sarif') != ''
        with:
          sarif_file: trivy-source-results.sarif
          category: trivy-source

  # ============================================================
  # Job 3: Build Docker image and push to ECR
  # ============================================================
  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [ci, scan-source]
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          # Use tag name if triggered by tag push, otherwise use branch+sha
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="manual-$(git rev-parse --short HEAD)"
          fi
          BASE=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "app_uri=${BASE}/${{ env.ECR_REPOSITORY_APP }}:${TAG}" >> $GITHUB_OUTPUT
          echo "worker_uri=${BASE}/${{ env.ECR_REPOSITORY_WORKER }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: yehub-be
          file: yehub-be/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.app_uri }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_APP }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # Separate build (not a re-tag of the API image): the worker needs its
      # own CMD (dist/src/worker) baked in via the Dockerfile's "worker"
      # stage, since EB's Dockerrun.aws.json "Cmd" override isn't honored on
      # the AL2023 single-container Docker platform.
      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: yehub-be
          file: yehub-be/Dockerfile
          target: worker
          push: true
          tags: |
            ${{ steps.meta.outputs.worker_uri }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_WORKER }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================
  # Job 4: Scan Docker image with Trivy
  # ============================================================
  scan-image:
    name: Scan Docker Image (Trivy)
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      security-events: write
      contents: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image reference
        id: imgref
        run: |
          TAG="${{ needs.build-push.outputs.image_tag }}"
          echo "uri=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_APP }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scanner (image)
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.imgref.outputs.uri }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy image scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-image-results.sarif') != ''
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  # ============================================================
  # Job 5: Deploy API to Beanstalk (app1)
  # Only runs when: manually triggered with deploy=true
  # ============================================================
  deploy-api:
    name: Deploy API → Beanstalk (app1)
    runs-on: ubuntu-latest
    needs: [build-push, scan-image]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == 'true' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Dockerrun.aws.json for API
        run: |
          # Reconstruct URI from env (secrets) + tag. Cross-job outputs that
          # contain AWS_ACCOUNT_ID (a secret) get masked to empty by GitHub,
          # so we only pass the non-secret image_tag between jobs.
          TAG="${{ needs.build-push.outputs.image_tag }}"
          if [ -z "$TAG" ]; then
            echo "ERROR: image_tag is empty — run the full workflow (Run workflow), not a single-job re-run."
            exit 1
          fi
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_APP }}:${TAG}"
          echo "Using image tag: $TAG"
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${IMAGE_URI}",
              "Update": "true"
            },
            "Ports": [{ "ContainerPort": 3000, "HostPort": 3000 }],
            "Volumes": [],
            "Env": []
          }
          EOF
          echo "=== Dockerrun.aws.json ==="
          cat Dockerrun.aws.json

      - name: Checkout for ebextensions
        uses: actions/checkout@v4
        with:
          sparse-checkout: yehub-be/.ebextensions-api

      - name: Package with ebextensions and upload to S3
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          cp -r yehub-be/.ebextensions-api .ebextensions
          zip -r api-${TAG}.zip Dockerrun.aws.json .ebextensions/
          aws s3 cp api-${TAG}.zip s3://${{ env.S3_BUCKET }}/deployments/api-${TAG}.zip

      - name: Create Beanstalk application version
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION }} \
            --version-label api-${TAG} \
            --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="deployments/api-${TAG}.zip" \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to Beanstalk API environment
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-name ${{ env.EB_ENV_API }} \
            --version-label api-${TAG} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-names ${{ env.EB_ENV_API }} \
            --region ${{ env.AWS_REGION }}

  # ============================================================
  # Job 6: Deploy Worker to Beanstalk (worker env)
  # Only runs when: manually triggered with deploy=true
  # ============================================================
  deploy-worker:
    name: Deploy Worker → Beanstalk (worker)
    runs-on: ubuntu-latest
    needs: [build-push, scan-image]
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == 'true' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Dockerrun.aws.json for Worker
        run: |
          # Reconstruct URI from env (secrets) + tag — see note in deploy-api.
          TAG="${{ needs.build-push.outputs.image_tag }}"
          if [ -z "$TAG" ]; then
            echo "ERROR: image_tag is empty — run the full workflow (Run workflow), not a single-job re-run."
            exit 1
          fi
          IMAGE_URI="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_WORKER }}:${TAG}"
          echo "Using image tag: $TAG"
          cat > Dockerrun.aws.json << EOF
          {
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "${IMAGE_URI}",
              "Update": "true"
            },
            "Ports": [{ "ContainerPort": 3001, "HostPort": 3001 }]
          }
          EOF
          echo "=== Dockerrun.aws.json ==="
          cat Dockerrun.aws.json

      - name: Checkout for ebextensions
        uses: actions/checkout@v4
        with:
          sparse-checkout: yehub-be/.ebextensions-worker

      - name: Package worker with ebextensions and upload to S3
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          cp -r yehub-be/.ebextensions-worker .ebextensions
          zip -r worker-${TAG}.zip Dockerrun.aws.json .ebextensions/
          aws s3 cp worker-${TAG}.zip s3://${{ env.S3_BUCKET }}/deployments/worker-${TAG}.zip

      - name: Create Beanstalk application version
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          aws elasticbeanstalk create-application-version \
            --application-name ${{ env.EB_APPLICATION }} \
            --version-label worker-${TAG} \
            --source-bundle S3Bucket="${{ env.S3_BUCKET }}",S3Key="deployments/worker-${TAG}.zip" \
            --region ${{ env.AWS_REGION }}

      - name: Deploy to Beanstalk Worker environment
        run: |
          TAG=${{ needs.build-push.outputs.image_tag }}
          aws elasticbeanstalk update-environment \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-name ${{ env.EB_ENV_WORKER }} \
            --version-label worker-${TAG} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment to complete
        run: |
          aws elasticbeanstalk wait environment-updated \
            --application-name ${{ env.EB_APPLICATION }} \
            --environment-names ${{ env.EB_ENV_WORKER }} \
            --region ${{ env.AWS_REGION }}
